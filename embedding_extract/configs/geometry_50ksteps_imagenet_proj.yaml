    checkpoint_step: 50000

  - run_name: "geometry-fixedcompute-10k-vicreg-imagenet-50ksteps"
    run_dir: "/workspace/runs/20260418_131622__geometry-fixedcompute-10k-vicreg-imagenet-50ksteps"
    checkpoint_step: 50000

  - run_name: "geometry-fixedcompute-100k-infonce-imagenet-50ksteps"
    run_dir: "/workspace/runs/20260417_172251__geometry-fixedcompute-100k-infonce-imagenet-50ksteps"
    checkpoint_step: 50000

  - run_name: "geometry-fixedcompute-100k-lejepa-imagenet-50ksteps"
    run_dir: "/workspace/runs/20260417_205629__geometry-fixedcompute-100k-lejepa-imagenet-50ksteps"
    checkpoint_step: 50000

  - run_name: "geometry-fixedcompute-100k-vicreg-imagenet-50ksteps"
