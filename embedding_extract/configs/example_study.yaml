study:
  name: "geometry_baselines_100k"
  output_root: "../outputs"

runs:
  - run_name: "geometry-fixedcompute-100k-infonce-random"
    run_dir: "/home/georgie/Desktop/neurips/representation/runs/20260410_181310__geometry-fixedcompute-100k-infonce-random"
    checkpoint_step: 10000

datasets:
  - dataset_name: "subset6_minus_7_test"
    root: "/home/georgie/Desktop/neurips/representation/data/subset6_minus_7_test_flat"
    split_label: "test"
    image_size: 224
    normalize_imagenet: true

extraction:
  batch_size: 256
  num_workers: 4
  device: "auto"
  precision: "fp32"
  overwrite: false

artifact:
  save_backbone: true
  save_projected: true

analyses:
  isotropy:
    enabled: true
    num_pairs: 200000
    seed: 0
    embedding_keys: ["emb", "proj"]

aggregation:
  summary_csv: "isotropy_summary.csv"
  row_keys: ["run_name", "checkpoint_step", "dataset_name", "split_label", "embedding_key"]
