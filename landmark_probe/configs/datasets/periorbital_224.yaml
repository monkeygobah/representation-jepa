dataset:
  name: "periorbital_224"
  root: "/workspace/landmark_probe/data/periorbital_224"

landmarks:
  keys:
    - "iris_centroid"
    - "iris_superior"
    - "iris_inferior"
    - "sclera_superior"
    - "sclera_inferior"
    - "medial_canthus"
    - "lateral_canthus"
    - "lid_superior"
    - "lid_inferior"

image:
  size: 224
  normalize_imagenet: true

subdatasets:
  - name: "celeb"
  - name: "cfd"

metadata:
  manifest_csv: "metadata/dataset_manifest.csv"
  landmarks_csv: "metadata/landmarks.csv"
  split_csv: "metadata/split_assignments.csv"

splits:
  seed: 0
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1

raw_sources:
  - name: "celeb"
    image_dir: "/workspace/segmentation/build_dataset/DATA/celeb_final_data/celeb_output_images"
    mask_dir: "/workspace/segmentation/build_dataset/DATA/celeb_final_data/celeb_output_masks"
    image_suffix: ".jpg"
    mask_suffix: ".png"

  - name: "cfd"
    image_dir: "/workspace/segmentation/build_dataset/DATA/cfd_final_data/cfd_output_images"
    mask_dir: "/workspace/segmentation/build_dataset/DATA/cfd_final_data/cfd_output_masks"
    image_suffix: ".jpg"
    mask_suffix: ".png"
